<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found | STACKLY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .error-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            background: var(--bg-deep);
        }
        .error-number {
            font-size: 18rem;
            font-family: var(--font-heading);
            color: var(--primary);
            line-height: 0.9;
            margin-bottom: 20px;
            text-shadow: 0 10px 50px rgba(197, 160, 89, 0.4);
        }
        @media (max-width: 768px) {
            .error-number { font-size: 10rem; }
        }
    </style>
</head>
<body>
    <!-- Preloader -->
    <div class="preloader">
        <div class="preloader-content text-center">
            <h1 class="logo" style="font-size: 4rem; opacity: 0.5;">STACKLY</h1>
            <div style="width: 200px; height: 1px; background: rgba(255,255,255,0.1); margin: 20px auto; overflow: hidden;">
                <div class="loader-bar" style="width: 0%; height: 100%; background: var(--primary);"></div>
            </div>
            <p style="text-transform: uppercase; letter-spacing: 5px; font-size: 0.8rem;">Lost in the kitchen...</p>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="nav">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; height: 100%;">
            <a href="index.html" class="logo" style="text-decoration: none; color: white;">STACKLY</a>
            <a href="index.html" class="btn btn-outline" style="padding: 10px 25px;">Back to Menu</a>
        </div>
    </nav>

    <!-- 404 Section -->
    <section class="error-section section" style="padding-top: 50px;">
        <div class="container" style="max-width: 800px;">
            
            <div class="arch-img" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.08; width: 600px; height: 800px; border-radius: 500px; overflow: hidden; pointer-events: none; border: 1px solid var(--primary);">
                <img src="images/image_14.webp" style="width: 100%; height: 100%; object-fit: cover;">
            </div>

            <div style="position: relative; z-index: 10;">
                <span class="card-cat">✦ 404 Error ✦</span>
                <h1 class="error-number anim-title">404</h1>
                <h2 class="hero-title pt-3" style="font-size: 3rem; margin-bottom: 30px;">Recipe Not Found</h2>
                <p style="opacity: 0.7; font-size: 1.2rem; margin-bottom: 40px; max-width: 600px; margin-left: auto; margin-right: auto;">
                    Looks like the page you are looking for has been taken off the menu! Don't worry, there's plenty more to explore back in our main dining room.
                </p>
                <div style="display: flex; justify-content: center; gap: 20px;">
                    <a href="index.html" class="btn btn-primary" style="padding: 15px 40px; font-size: 1.1rem;"><i class="fa fa-arrow-left" style="margin-right: 10px;"></i> Return Home</a>
                </div>
            </div>
            
        </div>
    </section>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
